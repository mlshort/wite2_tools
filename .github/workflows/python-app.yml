# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install testing/linting tools + your local package
        pip install pylint pytest mypy lxml
        pip install -e .
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Type check (MyPy)
      run: |
        mkdir -p reports
        # Use the --linecoverage-report to get the summary table you were expecting
        mypy src/ --linecoverage-report reports || true

    - name: Running Tests (Pytest)
      run: |
        pytest -m "not integration"

    # ==========================================================
    # DISABLED BLOCKS (Change 'if: false' to 'if: true' to enable)
    # ==========================================================

    - name: Extract Coverage and Determine Color
      if: github.ref == 'refs/heads/main'
      id: vars
      run: |
        REPORT_FILE="reports/index.txt"

        if [ -f "$REPORT_FILE" ]; then
          # 1. Parse the table: 
          # We use awk to calculate the weighted average of imprecision
          DATA=$(grep "|" "$REPORT_FILE" | grep "%" | sed 's/% imprecise//g' | sed 's/ LOC//g' | awk -F'|' '{print $2, $3}')
          
          # 2. Math: Σ(imprecision * lines) / Σ(lines)
          AVG_IMPRECISION=$(echo "$DATA" | awk '{ imprec=$1; loc=$2; sum_imprec += (imprec * loc); sum_loc += loc } END { if (sum_loc > 0) print sum_imprec / sum_loc; else print 0 }')
          
          # 3. Precision (Badge Value) = 100 - Imprecision
          # We round to the nearest whole number
          COVERAGE=$(echo "100 - $AVG_IMPRECISION" | bc -l | xargs printf "%.0f\n")
        else
          echo "MyPy report not found!"
          COVERAGE=0
        fi
        
        # 4. Safety check
        COVERAGE=${COVERAGE:-0}
        
        # 5. Use Bash integer comparison instead of 'bc'
        # Logic for badge color
        if [ "$COVERAGE" -gt 90 ]; then
          COLOR="brightgreen"
        elif [ "$COVERAGE" -gt 75 ]; then
          COLOR="green"
        else
          COLOR="yellow"
        fi

        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "color=$COLOR" >> $GITHUB_OUTPUT

    - name: Update Coverage Badge
      if: github.ref == 'refs/heads/main'
      uses: schneegans/dynamic-badges-action@v1.7.0
      with:
        auth: ${{ secrets.GIST_TOKEN }}
        gistID: 65b562e5180666321b1616e1a2e0033c
        filename: mypy-coverage.json
        label: MyPy Coverage
        message: ${{ steps.vars.outputs.percentage }}%
        color: ${{ steps.vars.outputs.color }}
